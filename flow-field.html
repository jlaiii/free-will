<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Will — Generative Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
        }
        canvas {
            display: block;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 12px;
            opacity: 0.7;
            pointer-events: none;
            text-shadow: 0 0 10px #00ff88;
            z-index: 10;
        }
        #title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 18px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="title">free will — generative flow field</div>
    <div id="info">move mouse to disturb the field • click to regenerate • sit back to watch</div>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let w, h, particles = [], mouse = { x: -1000, y: -1000, vx: 0, vy: 0 };
        let t = 0;
        let hueBase = Math.random() * 360;
        let lastMouse = { x: 0, y: 0 };

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            initParticles();
        }

        function initParticles() {
            particles = [];
            const count = Math.min(Math.floor((w * h) / 4000), 1200);
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: 0, vy: 0,
                    size: Math.random() * 2 + 0.5,
                    angle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.8 + 0.3,
                    life: Math.random() * Math.PI * 2,
                    hue: hueBase + Math.random() * 80 - 40,
                    layer: Math.random() < 0.3 ? 0 : 1
                });
            }
        }

        function noise(x, y, t) {
            const a = Math.sin(x * 0.003 + t * 0.7) * Math.cos(y * 0.003 - t);
            const b = Math.sin(x * 0.008 - t * 1.1) * Math.cos(y * 0.005 + t * 0.5);
            const c = Math.sin(x * 0.015 + y * 0.01 + t * 0.3);
            return (a + b * 0.5 + c * 0.25) / 1.75;
        }

        function draw() {
            ctx.fillStyle = 'rgba(10, 10, 18, 0.06)';
            ctx.fillRect(0, 0, w, h);

            t += 0.004;

            const currentHue = hueBase + Math.sin(t * 0.1) * 40;

            for (let p of particles) {
                let n = noise(p.x, p.y, t);
                p.angle += n * 0.025 + 0.002;

                let targetVx = Math.cos(p.angle) * p.speed;
                let targetVy = Math.sin(p.angle) * p.speed;

                let dx = p.x - mouse.x;
                let dy = p.y - mouse.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 250) {
                    let f = (250 - dist) / 250;
                    targetVx += mouse.vx * f * 3;
                    targetVy += mouse.vy * f * 3;
                }

                p.vx += (targetVx - p.vx) * 0.08;
                p.vy += (targetVy - p.vy) * 0.08;

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < -10) p.x = w + 10;
                if (p.x > w + 10) p.x = -10;
                if (p.y < -10) p.y = h + 10;
                if (p.y > h + 10) p.y = -10;

                p.life = (p.life + 0.005) % (Math.PI * 2);
                let alpha = (Math.sin(p.life) * 0.4 + 0.6);

                if (p.layer === 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * (0.8 + alpha * 0.4), 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue + t * 8}, 75%, 65%, ${alpha * 0.5})`;
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.vx * (8 + p.layer * 6), p.y - p.vy * (8 + p.layer * 6));
                ctx.strokeStyle = `hsla(${p.hue + t * 8}, 70%, 55%, ${alpha * (p.layer === 0 ? 0.12 : 0.06)})`;
                ctx.lineWidth = p.size * (p.layer === 0 ? 0.4 : 0.2);
                ctx.stroke();
            }

            // Subtle connections
            const step = 5;
            for (let i = 0; i < particles.length; i += step) {
                let p1 = particles[i];
                if (p1.layer !== 0) continue;
                for (let j = i + step * 5; j < particles.length; j += step * 10) {
                    let p2 = particles[j];
                    if (p2.layer !== 0) continue;
                    let dx = p1.x - p2.x;
                    let dy = p1.y - p2.y;
                    let d2 = dx * dx + dy * dy;
                    if (d2 < 90000) {
                        let d = Math.sqrt(d2);
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        let fade = (1 - d / 300) * 0.04;
                        ctx.strokeStyle = `hsla(${(p1.hue + p2.hue) / 2 + t * 8}, 50%, 50%, ${fade})`;
                        ctx.lineWidth = 0.2;
                        ctx.stroke();
                    }
                }
            }

            mouse.vx *= 0.92;
            mouse.vy *= 0.92;

            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => {
            mouse.vx = (e.clientX - mouse.x) * 0.5;
            mouse.vy = (e.clientY - mouse.y) * 0.5;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            clearTimeout(mouse.timer);
            mouse.timer = setTimeout(() => { mouse.vx = 0; mouse.vy = 0; }, 50);
        });
        window.addEventListener('click', () => {
            hueBase = Math.random() * 360;
            // Flash effect
            ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.fillRect(0, 0, w, h);
        });

        resize();
        draw();
    </script>
</body>
</html>
